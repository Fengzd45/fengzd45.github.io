            else if (absDiff === 2) base = (siblingSex==='男'?"侄孙":"甥孙") + (target.sex==='男'?"":"女");
            else if (absDiff === 3) base = (siblingSex==='男'?"侄曾孙":"甥曾孙") + (target.sex==='男'?"":"女");
            else if (absDiff === 4) base = (siblingSex==='男'?"侄玄孙":"甥玄孙") + (target.sex==='男'?"":"女");
            else base = `${absDiff}辈晚辈` + (target.sex==='男'?"男":"女");
            return prefix + mod + base;
        } else {
            const base = target.sex==='男'?"兄弟":"姐妹";
            return prefix + mod + base;
        }
    }
    if (spCount === 1) {
        const baseOps = ops.filter(op => op !== 'sp');
        const basePersons = pathPersons.filter((_,idx) => ops[idx] !== 'sp');
        const baseRel = getRelationship(start, target, basePersons, baseOps, people);
        return "姻" + baseRel;
    }
    return "未知关系";
}
function printRelationshipsWithClick(startName, relations, people) {
    const byGap = new Map();
    for (const [name, info] of Object.entries(relations)) {
        if (name === startName) continue;
        const gap = info.gap;
        if (!byGap.has(gap)) byGap.set(gap, []);
        byGap.get(gap).push({ name, pathPersons: info.pathPersons, pathOps: info.pathOps, person: info.person });
    }
    const sortedGaps = Array.from(byGap.keys()).sort((a,b) => b - a);
    const printedSpousesGlobal = new Set();
    const lines = [];
    const makeClickable = (name) => `<span class="clickable-name" data-name="${escapeHtml(name)}">${escapeHtml(name)}</span>`;
    for (const gap of sortedGaps) {
        const items = byGap.get(gap);
        if (gap > 0) lines.push(`\n上${gap}辈 ————————————————————————————`);
        else if (gap === 0) lines.push(`\n同辈 ————————————————————————————`);
        else lines.push(`\n下${-gap}辈 ————————————————————————————`);
        const groups = { f: [], m: [], sp: [], ch: [] };
        for (const item of items) {
            const first = item.pathOps[0] || '';
            if (groups[first]) groups[first].push(item);
            else groups['f'].push(item);
        }
        const sectionOrder = ['f','m','sp','ch'];
        const sectionTitle = { f:'【父系亲属】', m:'【母系亲属】', sp:'【配偶亲属】', ch:'【子女亲属】' };
        for (const first of sectionOrder) {
            if (!groups[first] || groups[first].length===0) continue;
            lines.push(sectionTitle[first]);
            for (const item of groups[first]) {
                const obj = item.person;
                if (printedSpousesGlobal.has(obj.name)) continue;
                const rel = getRelationship(people[startName], obj, item.pathPersons, item.pathOps, people);
                let line = `  ${rel} ${makeClickable(obj.name)}`;
                if (obj.spouse && obj.spouse.length) {
                    const spouseObjs = obj.spouse.map(sn => people[sn]).filter(s => s);
                    if (spouseObjs.length) line += ` 配 ${spouseObjs.map(sp => makeClickable(sp.name)).join('、')}`;
                }
                lines.push(line);
                for (const spName of obj.spouse) {
                    const spouseObj = people[spName];
                    if (!spouseObj || printedSpousesGlobal.has(spouseObj.name)) continue;
                    if (!spouseObj.fatherObj && !spouseObj.motherObj) {
                        const spousePathPersons = [...item.pathPersons, spouseObj];
                        const spouseOps = [...item.pathOps, 'sp'];
                        const spouseRel = getRelationship(people[startName], spouseObj, spousePathPersons, spouseOps, people);
                        lines.push(`  ${spouseRel} ${makeClickable(spouseObj.name)}`);
                        printedSpousesGlobal.add(spouseObj.name);
                    }
                }
            }
        }
    }
    return lines.join('\n');
}
function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
}

// ==================== 在线版多媒体弹窗 ====================
async function showPersonMediaInModal(personName) {
    const modal = document.getElementById('mediaModal');
    const modalTitle = document.getElementById('modalTitle');
    const modalBody = document.getElementById('modalBody');
    modalTitle.innerHTML = `📁 ${escapeHtml(personName)} 的资料`;
    modalBody.innerHTML = `<div class="empty-media-modal">⏳ 正在加载文件列表...</div>`;
    modal.classList.add('active');
    
    const files = FILE_MANIFEST[personName];
    if (!files || files.length === 0) {
        modalBody.innerHTML = `<div class="empty-media-modal">📭 该人物暂无资料文件</div>`;
        return;
    }
    
    const baseUrl = window.location.href.substring(0, window.location.href.lastIndexOf('/') + 1);
    const personDir = `${baseUrl}资料/${encodeURIComponent(personName)}/`;
    
    let fileListHtml = `<div class="file-list-modal">`;
    for (const fname of files) {
        const ext = fname.split('.').pop().toLowerCase();
        let icon = '📄';
        if (['jpg','jpeg','png','gif'].includes(ext)) icon = '🖼️';
        else if (['mp3','wav','amr'].includes(ext)) icon = '🎵';
        else if (['mp4','mov'].includes(ext)) icon = '🎬';
        else if (ext === 'txt') icon = '📃';
        fileListHtml += `<div class="file-item-modal" data-filename="${escapeHtml(fname)}"><span class="file-icon-modal">${icon}</span><span class="file-name-modal">${escapeHtml(fname)}</span></div>`;
    }
    fileListHtml += `</div><div id="modalPreviewArea" class="media-preview-modal"><div class="empty-media-modal">点击上方文件预览</div></div>`;
    modalBody.innerHTML = fileListHtml;
    
    document.querySelectorAll('.file-item-modal').forEach(el => {
        const fname = el.getAttribute('data-filename');
        const fileUrl = `${personDir}${encodeURIComponent(fname)}`;
        el.onclick = async () => {
            const previewArea = document.getElementById('modalPreviewArea');
            const ext = fname.split('.').pop().toLowerCase();
            if (['jpg','jpeg','png','gif'].includes(ext)) {
                previewArea.innerHTML = `<img src="${fileUrl}" class="preview-image" style="max-width:100%" onerror="this.parentElement.innerHTML='<div class=\'empty-media-modal\'>文件不存在或无法加载</div>'"><br><a href="${fileUrl}" download class="download-link-modal">⬇️ 下载</a>`;
            } else if (['mp3','wav','amr'].includes(ext)) {
                previewArea.innerHTML = `<audio controls src="${fileUrl}" style="width:100%"></audio><br><a href="${fileUrl}" download class="download-link-modal">⬇️ 下载</a>`;
            } else if (['mp4','mov'].includes(ext)) {
                previewArea.innerHTML = `<video controls src="${fileUrl}" style="max-width:100%"></video><br><a href="${fileUrl}" download class="download-link-modal">⬇️ 下载</a>`;
            } else if (ext === 'txt') {
                try {
                    const resp = await fetch(fileUrl);
                    const text = await resp.text();
                    previewArea.innerHTML = `<div class="preview-text">${escapeHtml(text)}</div><a href="${fileUrl}" download class="download-link-modal">⬇️ 下载</a>`;
                } catch(e) {
                    previewArea.innerHTML = `<div class="empty-media-modal">无法加载文本</div>`;
                }
            } else {
                previewArea.innerHTML = `<div class="empty-media-modal"><a href="${fileUrl}" target="_blank">点击下载文件</a></div>`;
            }
        };
    });
}

// ==================== 页面交互 ====================
const peopleData = parseJsonl(REAL_JSONL);
function search() {
    const startName = document.getElementById('startName').value.trim();
    if (!startName) {
        document.getElementById('output').innerHTML = '<pre>请输入姓名</pre>';
        return;
    }
    if (!peopleData[startName]) {
        document.getElementById('output').innerHTML = `<pre>❌ 错误：'${startName}' 不在家谱中。</pre>`;
        return;
    }
    const relations = bfsRelationships(startName, peopleData);
    const outputText = printRelationshipsWithClick(startName, relations, peopleData);
    document.getElementById('output').innerHTML = `<pre>========== 从 ${escapeHtml(startName)} 出发的家族关系树 ==========\n${outputText}</pre>`;
}
document.getElementById('searchBtn').addEventListener('click', search);
document.getElementById('startName').addEventListener('keypress', (e) => { if (e.key === 'Enter') search(); });
document.getElementById('output').addEventListener('click', async (e) => {
    let target = e.target;
    if (target.classList && target.classList.contains('clickable-name')) {
        const name = target.getAttribute('data-name');
        if (name && peopleData[name]) {
            await showPersonMediaInModal(name);
        }
    }
});

window.addEventListener('scroll', () => { toTopBtn.style.display = window.scrollY > 300 ? 'flex' : 'none'; });
toTopBtn.addEventListener('click', () => { window.scrollTo({ top: 0, behavior: 'smooth' }); });
