// ==================== 3. 解析家谱 ====================
class Person {
    constructor(data) {
        this.name = data.n;
        this.sex = data.s;
        this.father = data.f || "";
        this.mother = data.m || "";
        this.spouse = data.sp || [];
        this.info = data.info || "";
        this.children = [];
        this.fatherObj = null;
        this.motherObj = null;
    }
}
function parseJsonl(text) {
    const lines = text.split(/\r?\n/);
    const people = {};
    for (const line of lines) {
        if (!line.trim()) continue;
        try {
            const obj = JSON.parse(line);
            const p = new Person(obj);
            people[p.name] = p;
        } catch(e) {}
    }
    for (const p of Object.values(people)) {
        if (p.father && people[p.father]) {
            p.fatherObj = people[p.father];
            people[p.father].children.push(p);
        }
        if (p.mother && people[p.mother]) {
            p.motherObj = people[p.mother];
            people[p.mother].children.push(p);
        }
    }
    return people;
}

// ==================== 4. 关系查询 ====================
function bfsRelationships(startName, people) {
    const start = people[startName];
    if (!start) return {};
    const visited = {};
    const queue = [{ person: start, genGap: 0, pathPersons: [], pathOps: [] }];
    while (queue.length) {
        const { person: cur, genGap, pathPersons, pathOps } = queue.shift();
        if (visited[cur.name]) continue;
        visited[cur.name] = { gap: genGap, pathPersons: [...pathPersons], pathOps: [...pathOps], person: cur };
        if (cur.fatherObj) queue.push({ person: cur.fatherObj, genGap: genGap+1, pathPersons: [...pathPersons, cur.fatherObj], pathOps: [...pathOps, 'f'] });
        if (cur.motherObj) queue.push({ person: cur.motherObj, genGap: genGap+1, pathPersons: [...pathPersons, cur.motherObj], pathOps: [...pathOps, 'm'] });
        for (const child of cur.children) queue.push({ person: child, genGap: genGap-1, pathPersons: [...pathPersons, child], pathOps: [...pathOps, 'ch'] });
        for (const spName of cur.spouse) if (people[spName]) queue.push({ person: people[spName], genGap: genGap, pathPersons: [...pathPersons, people[spName]], pathOps: [...pathOps, 'sp'] });
    }
    return visited;
}
function getRelationshipSimple(start, target, pathOps) {
    const upSteps = pathOps.filter(op => op === 'f' || op === 'm').length;
    const downSteps = pathOps.filter(op => op === 'ch').length;
    if (pathOps.length === 1 && pathOps[0] === 'sp') return "配偶";
    if (upSteps === 1 && downSteps === 0) return target.sex === '男' ? "父亲" : "母亲";
    if (upSteps === 2 && downSteps === 0) return target.sex === '男' ? "祖父" : "祖母";
    if (upSteps === 3 && downSteps === 0) return target.sex === '男' ? "曾祖父" : "曾祖母";
    if (upSteps === 0 && downSteps === 1) return target.sex === '男' ? "儿子" : "女儿";
    if (upSteps === 0 && downSteps === 2) return target.sex === '男' ? "孙子" : "孙女";
    if (upSteps === 0 && downSteps === 3) return target.sex === '男' ? "曾孙" : "曾孙女";
    if (upSteps === 1 && downSteps === 1) {
        const sibling = target.children.find(c => c.name === start?.name);
        if (sibling) return target.sex === '男' ? (sibling.sex === '男' ? "侄子" : "侄女") : (sibling.sex === '男' ? "外甥" : "外甥女");
    }
    return target.sex === '男' ? "亲属" : "亲属";
}
function printRelationships(startName, relations, people) {
    const start = people[startName];
    if (!start) return "查无此人";
    const lines = [`========== 从 ${startName} 出发的家族关系 ==========`];
    const byGap = {};
    for (const [name, info] of Object.entries(relations)) {
        if (name === startName) continue;
        const gap = info.gap;
        if (!byGap[gap]) byGap[gap] = [];
        byGap[gap].push({ name, person: info.person, pathOps: info.pathOps });
    }
    const sortedGaps = Object.keys(byGap).map(Number).sort((a,b) => b - a);
    for (const gap of sortedGaps) {
        if (gap > 0) lines.push(`\n【上${gap}辈】`);
        else if (gap === 0) lines.push(`\n【同辈】`);
        else lines.push(`\n【下${-gap}辈】`);
        for (const item of byGap[gap]) {
            const rel = getRelationshipSimple(start, item.person, item.pathOps);
            let spouseText = "";
            if (item.person.spouse && item.person.spouse.length) {
                spouseText = ` 配 ${item.person.spouse.join('、')}`;
            }
            lines.push(`  ${rel}：${item.name}${spouseText}`);
        }
    }
    return lines.join('\n');
}

                previewArea.innerHTML = `<img src="${fileUrl}" class="preview-image" style="max-width:100%" onerror="this.parentElement.innerHTML='<div class=\'empty-media-modal\'>文件不存在或无法加载</div>'"><br><a href="${fileUrl}" download class="download-link">⬇️ 下载</a>`;
            } else if (['mp3','wav','amr'].includes(ext)) {
                previewArea.innerHTML = `<audio controls src="${fileUrl}" style="width:100%"></audio><br><a href="${fileUrl}" download class="download-link">⬇️ 下载</a>`;
            } else if (['mp4','mov'].includes(ext)) {
                previewArea.innerHTML = `<video controls src="${fileUrl}" style="max-width:100%"></video><br><a href="${fileUrl}" download class="download-link">⬇️ 下载</a>`;
            } else if (ext === 'txt') {
                try {
                    const resp = await fetch(fileUrl);
                    const text = await resp.text();
                    previewArea.innerHTML = `<div class="preview-text">${escapeHtml(text)}</div><a href="${fileUrl}" download class="download-link">⬇️ 下载</a>`;
                } catch(e) {
                    previewArea.innerHTML = `<div class="empty-media-modal">无法加载文本</div>`;
                }
            } else {
                previewArea.innerHTML = `<div class="empty-media-modal"><a href="${fileUrl}" target="_blank">点击下载文件</a></div>`;
            }
        };
    });
}

// ==================== 6. 页面交互 ====================
document.getElementById('searchBtn').addEventListener('click', () => {
    const name = document.getElementById('startName').value.trim();
    if (!name) { alert('请输入姓名'); return; }
    if (!peopleData[name]) { document.getElementById('output').innerHTML = `<pre>❌ 未找到：${name}</pre>`; return; }
    const relations = bfsRelationships(name, peopleData);
    const outputText = printRelationships(name, relations, peopleData);
    let html = `<pre>${outputText}</pre>`;
    // 将输出中的姓名转换为可点击
    for (const person of Object.keys(peopleData)) {
        const regex = new RegExp(`(${person})`, 'g');
        html = html.replace(regex, `<span class="clickable-name" data-name="${person}">$1</span>`);
    }
    document.getElementById('output').innerHTML = html;
    
    // 绑定点击事件
    document.querySelectorAll('.clickable-name').forEach(el => {
        el.onclick = () => showPersonMediaInModal(el.getAttribute('data-name'));
    });
});

document.getElementById('output').addEventListener('click', (e) => {
    let target = e.target;
    if (target.classList && target.classList.contains('clickable-name')) {
        showPersonMediaInModal(target.getAttribute('data-name'));
    }
});

// 模态框关闭
document.getElementById('closeModalBtn').onclick = () => document.getElementById('mediaModal').classList.remove('active');
document.getElementById('mediaModal').onclick = (e) => { if (e.target === document.getElementById('mediaModal')) document.getElementById('mediaModal').classList.remove('active'); };

// 回到顶部
window.onscroll = () => document.getElementById('toTopBtn').style.display = window.scrollY > 300 ? 'flex' : 'none';
document.getElementById('toTopBtn').onclick = () => window.scrollTo({ top: 0, behavior: 'smooth' });
</script>
